version: '3.9'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: spare_db
      POSTGRES_USER: spare_user
      POSTGRES_PASSWORD: spare_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: ../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../backend:/code
    environment:
      - DATABASE_URL=postgresql+psycopg2://spare_user:spare_pass@db:5432/spare_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ../frontend
    command: npm run dev
    volumes:
      - ../frontend:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
